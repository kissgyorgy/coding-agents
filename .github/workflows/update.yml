name: Update packages

on:
  schedule:
    - cron: "0 5 * * *"
    - cron: "30 11 * * *"
    - cron: "30 17 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - uses: cachix/cachix-action@v16
        with:
          name: coding-agents
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          skipPush: true

      - name: Install tools
        run: nix profile install nixpkgs#just nixpkgs#nix-update nixpkgs#gh

      - name: Run update
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          just update

      - name: Push changes
        run: git push

      - name: Build and push to cachix
        run: |
          failed=()
          for pkg in claude-code claude-code-ui gemini-cli ccusage codex pi-coding-agent; do
            echo "::group::Building $pkg"
            if nix build .#"$pkg" 2>&1; then
              cachix push coding-agents ./result*
            else
              echo "::warning::Failed to build $pkg, skipping"
              failed+=("$pkg")
            fi
            echo "::endgroup::"
          done
          if [[ ${#failed[@]} -gt 0 ]]; then
            echo "::warning::Failed to build: ${failed[*]}"
          fi
